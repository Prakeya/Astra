kind = "web"
previewPath = "/"
title = "Astra — You Are Never Alone"
version = "1.0.0"
id = "artifacts/astra"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20686

[services.development]
run = "pnpm --filter @workspace/astra run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/astra", "run", "build" ]
serve = "static"
publicDir = "artifacts/astra/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20686"
BASE_PATH = "/"
